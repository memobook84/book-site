<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巻詳細 - Book Store</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="volume.css">
    <script src="book-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="volume.js"></script>
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="index.html" class="header-logo"><img src="logo.png" alt="Logo" class="header-logo-img"></a>
            <h1><a href="index.html">Book Store</a></h1>
            <nav class="header-nav">
                <a href="home.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>Home</a>
                <a href="new-releases.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/></svg>New Release</a>
                <a href="ranking.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21l8 0"/><path d="M12 17l0 4"/><path d="M7 4l10 0"/><path d="M17 4v8a5 5 0 0 1 -10 0v-8"/><path d="M7 8h-3a1 1 0 0 0 -1 1v1a3 3 0 0 0 3 3h1"/><path d="M17 8h3a1 1 0 0 1 1 1v1a3 3 0 0 1 -3 3h-1"/></svg>Ranking</a>
                <a href="follow.html" class="nav-link follow-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/></svg>Follow</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search novels...">
                <button class="search-icon" aria-label="検索">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path>
                        <path d="M21 21l-6 -6"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 巻詳細ページコンテンツ -->
    <main class="volume-main">
        <div class="volume-container">
            <!-- 左側：表紙画像 -->
            <div class="volume-image">
                <img id="volume-cover" src="" alt="本の表紙">
            </div>

            <!-- 右側：詳細情報 -->
            <div class="volume-info-detail">
                <div class="volume-title-row">
                    <h1 id="volume-title" class="volume-title-main">読み込み中...</h1>
                    <span id="volume-number" class="volume-number-display">-</span>
                </div>

                <div class="detail-meta-sideline">
                    <div class="meta-row">
                        <span class="meta-row-label">著者</span>
                        <a href="#" id="volume-author" class="meta-row-value author-link">-</a>
                    </div>
                    <div class="meta-row">
                        <span class="meta-row-label">出版社</span>
                        <span id="volume-publisher" class="meta-row-value">-</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-row-label">レーベル</span>
                        <span id="volume-label" class="meta-row-value">-</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-row-label">発売日</span>
                        <span id="volume-date" class="meta-row-value">-</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-row-label">価格</span>
                        <span id="volume-price" class="meta-row-value">-</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-row-label">ISBN</span>
                        <span id="volume-isbn" class="meta-row-value">-</span>
                    </div>
                    <div class="meta-row">
                        <span class="meta-row-label">ページ数</span>
                        <span id="volume-pagecount" class="meta-row-value">-</span>
                    </div>
                </div>

            </div>
        </div>

        <!-- この巻について（画像の下に配置） -->
        <div class="volume-description">
            <h2>この巻について</h2>
            <p id="volume-synopsis">読み込み中...</p>
        </div>

        <div class="volume-buttons">
            <a href="#" id="buy-rakuten" class="buy-button rakuten-button" target="_blank">
                楽天で購入
            </a>
            <a href="#" id="buy-amazon" class="buy-button amazon-button" target="_blank">
                Amazonで購入
            </a>
        </div>

        <!-- 前後の巻ナビゲーション -->
        <div id="volume-slider" class="volume-slider" style="display:none;">
            <button id="prev-volume" class="slider-btn slider-prev" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6l6 6"/></svg>
                <span id="prev-label">前の巻</span>
            </button>
            <span id="volume-position" class="volume-position"></span>
            <button id="next-volume" class="slider-btn slider-next" disabled>
                <span id="next-label">次の巻</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6l-6 6"/></svg>
            </button>
        </div>

        <div class="navigation-buttons">
            <a href="#" id="back-to-series" class="nav-button">← 作品ページに戻る</a>
        </div>
    </main>
    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="javascript:history.back()" class="bottom-nav-item" data-page="back">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6l6 6"/></svg>
            <span>Back</span>
        </a>
        <a href="/home.html" class="bottom-nav-item" data-page="home">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>
            <span>Home</span>
        </a>
        <a href="/new-releases.html" class="bottom-nav-item" data-page="new-releases">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/></svg>
            <span>New</span>
        </a>
        <a href="/ranking.html" class="bottom-nav-item" data-page="ranking">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21l8 0"/><path d="M12 17l0 4"/><path d="M7 4l10 0"/><path d="M17 4v8a5 5 0 0 1 -10 0v-8"/><path d="M7 8h-3a1 1 0 0 0 -1 1v1a3 3 0 0 0 3 3h1"/><path d="M17 8h3a1 1 0 0 1 1 1v1a3 3 0 0 1 -3 3h-1"/></svg>
            <span>Ranking</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/></svg>
            <span>Follow</span>
        </a>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path.includes('home'))) ||
                (page === 'new-releases' && path.includes('new-releases')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
</body>
</html>
