            <button class="mobile-menu-btn" id="mobile-menu-btn" aria-label="メニュー">

    <!-- モバイルメニュー -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>
    <div class="mobile-menu-drawer" id="mobile-menu-drawer">
        <div class="mobile-menu-header">
            <span class="mobile-menu-title">Book Store</span>
            <button class="mobile-menu-close" id="mobile-menu-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
        <ul class="mobile-menu-list">
            <li><a href="/home.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>Home</a></li>
            <li><a href="/new-releases.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/></svg>New Release</a></li>
            <li><a href="/ranking.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21l8 0"/><path d="M12 17l0 4"/><path d="M7 4l10 0"/><path d="M17 4v8a5 5 0 0 1 -10 0v-8"/><path d="M7 8h-3a1 1 0 0 0 -1 1v1a3 3 0 0 0 3 3h1"/><path d="M17 8h3a1 1 0 0 1 1 1v1a3 3 0 0 1 -3 3h-1"/></svg>Ranking</a></li>
            <li><a href="/follow.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/></svg>Follow</a></li>
            <li><a href="/scatter.html"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="5" r="1.5"/><circle cx="19" cy="7" r="1.5"/><circle cx="10" cy="15" r="1.5"/><circle cx="17" cy="17" r="1.5"/><circle cx="7" cy="12" r="1.5"/></svg>Random</a></li>
        </ul>
    </div>
    <script>
    (function() {
        var btn = document.getElementById('mobile-menu-btn');
        var overlay = document.getElementById('mobile-menu-overlay');
        var drawer = document.getElementById('mobile-menu-drawer');
        var close = document.getElementById('mobile-menu-close');
        if (!btn) return;
        function openMenu() { overlay.classList.add('open'); drawer.classList.add('open'); }
        function closeMenu() { overlay.classList.remove('open'); drawer.classList.remove('open'); }
        btn.addEventListener('click', openMenu);

        overlay.addEventListener('click', closeMenu);
        close.addEventListener('click', closeMenu);
        var path = location.pathname;
        drawer.querySelectorAll('a').forEach(function(a) {
            var href = a.getAttribute('href').replace('/', '');
            if (href && path.includes(href.replace('.html', ''))) {
                a.classList.add('active');
            }
        });
    })();
    </script>

    <!-- 著者詳細ページコンテンツ -->
    <main class="author-main">
        <!-- 著者情報セクション -->
        <div class="author-info-section">
            <div class="author-header">
                <h1 id="author-name" class="author-name">読み込み中...</h1>
                <p id="author-description" class="author-description"></p>
                <div class="author-meta">
                    <span id="author-works-count" class="works-count">-</span>
                </div>
            </div>

            <div class="author-profile">
                <h2>プロフィール</h2>
                <p id="author-bio">読み込み中...</p>
            </div>

            <div class="author-representative">
                <h2>代表作品</h2>
                <ul id="representative-works">
                    <!-- JavaScriptで動的に生成 -->
                </ul>
            </div>
        </div>

        <!-- この著者の作品一覧 -->
        <div class="author-works-section">
            <h2 class="section-title">この著者の作品</h2>
            <div id="author-works-grid" class="author-works-grid">
                <!-- JavaScriptで動的に生成 -->
            </div>
        </div>

    </main>
    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="javascript:history.back()" class="bottom-nav-item" data-page="back">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6l6 6"/></svg>
            <span>Back</span>
        </a>
        <a href="/home.html" class="bottom-nav-item" data-page="home">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>
            <span>Home</span>
        </a>
        <a href="/new-releases.html" class="bottom-nav-item" data-page="new-releases">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/></svg>
            <span>New</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/></svg>
            <span>Follow</span>
        </a>
        <button class="bottom-nav-item bottom-nav-search-btn" id="bottom-search-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            <span>Search</span>
        </button>
    </nav>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path.includes('home'))) ||
                (page === 'new-releases' && path.includes('new-releases')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>

    <!-- 検索オーバーレイ -->
    <div class="search-overlay" id="search-overlay">
        <div class="search-overlay-inner">
            <input type="text" class="search-overlay-input" id="search-overlay-input" placeholder="Search novels...">
            <button class="search-overlay-close" id="search-overlay-close">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>
    <script>
    (function() {
        var searchBtn = document.getElementById('bottom-search-btn');
        var overlay = document.getElementById('search-overlay');
        var input = document.getElementById('search-overlay-input');
        if (!searchBtn || !overlay) return;
        searchBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            overlay.classList.add('open');
            setTimeout(function() { input.focus(); }, 100);
        });
        overlay.addEventListener('click', function(e) {
            e.stopPropagation();
        });
        document.addEventListener('click', function() {
            overlay.classList.remove('open');
        });
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && input.value.trim()) {
                window.location.href = '/search.html?q=' + encodeURIComponent(input.value.trim());
            }
            if (e.key === 'Escape') overlay.classList.remove('open');
        });
    })();
    </script>
</body>
</html>
