    <script>
    (function() {
        function doHeaderSearch() {
            var inp = document.querySelector('.search-box input');
            if (!inp) return;
            var q = inp.value.trim();
            if (q) window.location.href = '/search.html?q=' + encodeURIComponent(q);
        }
        var btn = document.querySelector('.search-box button.search-icon');
        var inp = document.querySelector('.search-box input');
        if (btn) btn.addEventListener('click', doHeaderSearch);
        if (inp) inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doHeaderSearch(); });
    })();
    </script>

    <script>
    (function() {
        var btn = document.getElementById('mobile-menu-btn');
        var overlay = document.getElementById('mobile-menu-overlay');
        var drawer = document.getElementById('mobile-menu-drawer');
        var close = document.getElementById('mobile-menu-close');
        if (!btn) return;
        function openMenu() { overlay.classList.add('open'); drawer.classList.add('open'); }
        function closeMenu() { overlay.classList.remove('open'); drawer.classList.remove('open'); }
        btn.addEventListener('click', openMenu);

        overlay.addEventListener('click', closeMenu);
        close.addEventListener('click', closeMenu);
        var path = location.pathname;
        drawer.querySelectorAll('a').forEach(function(a) {
            var href = a.getAttribute('href').replace('/', '');
            if (href && path.includes(href.replace('.html', ''))) {
                a.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path.includes('home'))) ||
                (page === 'new-releases' && path.includes('new-releases')) ||
                (page === 'ranking' && path.includes('ranking')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <!-- 検索オーバーレイ -->
    <div class="search-overlay" id="search-overlay">
        <form class="search-overlay-inner" action="/search.html" method="get">
            <input type="search" name="q" class="search-overlay-input" id="search-overlay-input" autocomplete="off" enterkeyhint="search" placeholder="Search novels...">
            <button class="search-overlay-close" id="search-overlay-close" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </form>
    </div>
    <script>
    (function() {
        var searchBtn = document.getElementById('bottom-search-btn');
        var overlay = document.getElementById('search-overlay');
        var input = document.getElementById('search-overlay-input');
        if (!searchBtn || !overlay) return;
        searchBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            overlay.classList.add('open');
            setTimeout(function() { input.focus(); }, 100);
        });
        overlay.addEventListener('click', function(e) {
            e.stopPropagation();
        });
        document.addEventListener('click', function() {
            overlay.classList.remove('open');
        });
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') overlay.classList.remove('open');
        });
    })();
    </script>
    <script src="header-search.js"></script>
    <script>
    (function() {
        var header = document.querySelector("header");
        var lastY = 0;
        window.addEventListener("scroll", function() {
            var y = window.scrollY;
            if (y > lastY && y > 60) {
                header.classList.add("header-hidden");
            } else {
                header.classList.remove("header-hidden");
            }
            lastY = y;
        }, { passive: true });
    })();
    </script>
