<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品詳細 - NODEBOOK</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#930000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&family=Crimson+Pro:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="detail.css">
    <script src="book-data.js"></script>
    <script src="rakuten-adapter.js"></script>
    <script src="detail.js"></script>
</head>
<body>
    <div id="splash-screen"><img src="/logo-top.png" alt="NODEBOOK"></div>
    <script>(function(){var s=document.getElementById('splash-screen');var isStandalone=window.navigator.standalone||window.matchMedia('(display-mode: standalone)').matches;if(!isStandalone){s.style.display='none';return;}setTimeout(function(){s.classList.add('hidden');setTimeout(function(){s.remove();},400);},1000);})();</script>
    <!-- ヘッダー -->
    <header>
        <div class="header-container">
            <a href="home.html" class="header-logo"><img src="logo.png" alt="Logo" class="header-logo-img"></a>
            <h1><a href="home.html">NODEBOOK</a></h1>
            <nav class="header-nav">
                <a href="home.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>Home</a>
                <a href="new-releases.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/></svg>New Release</a>
                <a href="ranking.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21l8 0"/><path d="M12 17l0 4"/><path d="M7 4l10 0"/><path d="M17 4v8a5 5 0 0 1 -10 0v-8"/><path d="M7 8h-3a1 1 0 0 0 -1 1v1a3 3 0 0 0 3 3h1"/><path d="M17 8h3a1 1 0 0 1 1 1v1a3 3 0 0 1 -3 3h-1"/></svg>Ranking</a>
                <a href="follow.html" class="nav-link follow-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/></svg>Follow</a> <a href="scatter.html" class="nav-link"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="5" r="1.5"/><circle cx="19" cy="7" r="1.5"/><circle cx="10" cy="15" r="1.5"/><circle cx="17" cy="17" r="1.5"/><circle cx="7" cy="12" r="1.5"/></svg>Scatter</a>
            </nav>
            <div class="search-box">
                <input type="text" placeholder="Search novels...">
                <button class="search-icon" aria-label="検索">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0"></path>
                        <path d="M21 21l-6 -6"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>
    <script>
    (function() {
        function doHeaderSearch() {
            var inp = document.querySelector('.search-box input');
            if (!inp) return;
            var q = inp.value.trim();
            if (q) window.location.href = '/search.html?q=' + encodeURIComponent(q);
        }
        var btn = document.querySelector('.search-box button.search-icon');
        var inp = document.querySelector('.search-box input');
        if (btn) btn.addEventListener('click', doHeaderSearch);
        if (inp) inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') doHeaderSearch(); });
    })();
    </script>

    <!-- 詳細ページコンテンツ -->
    <main class="detail-main">
        <div class="detail-container">
            <!-- 左側：表紙画像 + フォローボタン -->
            <div class="detail-image">
                <img id="book-image" src="" alt="本の表紙">
                <button id="follow-button" class="follow-button" aria-label="フォロー">
                    <span class="follow-label">Follow</span>
                    <span class="follow-cross">
                        <span class="cross-h"></span>
                        <span class="cross-v"></span>
                    </span>
                </button>
            </div>

            <!-- 右側：詳細情報 -->
            <div class="detail-info">
                <h1 id="book-title" class="detail-title">読み込み中...</h1>
                <a href="#" id="book-author" class="detail-author">-</a>

                <div class="detail-meta">
                    <div class="meta-item">
                        <span class="meta-label">出版社：</span>
                        <span id="book-publisher" class="meta-value">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">レーベル：</span>
                        <span id="book-label" class="meta-value">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">ジャンル：</span>
                        <span id="book-genre" class="meta-value">-</span>
                    </div>
                    <div class="meta-item">
                        <span class="meta-label">巻数：</span>
                        <span id="book-date" class="meta-value">-</span>
                    </div>
                </div>

            </div>
        </div>

        <!-- 作品紹介 -->
        <div class="detail-description">
            <h2>作品紹介</h2>
            <p id="book-description">読み込み中...</p>
        </div>

        <!-- シリーズ一覧セクション -->
        <div class="volumes-section">
            <h2 class="volumes-title">シリーズ一覧</h2>
            <div id="volumes-grid" class="volumes-grid">
                <!-- JavaScriptで動的に生成 -->
            </div>
        </div>
    </main>
    <!-- ボトムナビ -->
    <nav class="bottom-nav">
        <a href="javascript:history.back()" class="bottom-nav-item" data-page="back">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6l-6 6l6 6"/></svg>
            <span>Back</span>
        </a>
        <a href="/" class="bottom-nav-item" data-page="home">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l-2 0l9 -9l9 9l-2 0"/><path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/><path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/></svg>
            <span>Home</span>
        </a>
        <a href="/new-releases.html" class="bottom-nav-item" data-page="new-releases">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z"/><path d="M16 3v4"/><path d="M8 3v4"/><path d="M4 11h16"/></svg>
            <span>New</span>
        </a>
        <a href="/follow.html" class="bottom-nav-item" data-page="follow">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19.5 12.572l-7.5 7.428l-7.5 -7.428a5 5 0 1 1 7.5 -6.566a5 5 0 1 1 7.5 6.572"/></svg>
            <span>Follow</span>
        </a>
        <button class="bottom-nav-item bottom-nav-search-btn" id="bottom-search-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
            <span>Search</span>
        </button>
    </nav>

    <!-- 検索オーバーレイ -->
    <div class="search-overlay" id="search-overlay">
        <form class="search-overlay-inner" action="/search.html" method="get">
            <input type="search" name="q" class="search-overlay-input" id="search-overlay-input" autocomplete="off" enterkeyhint="search" placeholder="Search novels...">
            <button class="search-overlay-close" id="search-overlay-close" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </form>
    </div>
    <script>
    (function() {
        var searchBtn = document.getElementById('bottom-search-btn');
        var overlay = document.getElementById('search-overlay');
        var input = document.getElementById('search-overlay-input');
        if (!searchBtn || !overlay) return;
        searchBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            overlay.classList.add('open');
            setTimeout(function() { input.focus(); }, 100);
        });
        overlay.addEventListener('click', function(e) {
            e.stopPropagation();
        });
        document.addEventListener('click', function() {
            overlay.classList.remove('open');
        });
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') overlay.classList.remove('open');
        });
    })();
    </script>

    <script>
    (function() {
        var path = location.pathname;
        var items = document.querySelectorAll('.bottom-nav-item');
        items.forEach(function(item) {
            var page = item.dataset.page;
            if ((page === 'home' && (path === '/' || path === '/index.html')) ||
                (page === 'new-releases' && path.includes('new-releases')) ||
                (page === 'follow' && path.includes('follow'))) {
                item.classList.add('active');
            }
        });
    })();
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
    </script>
    <script src="header-search.js"></script>
    <script>
    (function() {
        var header = document.querySelector("header");
        var lastY = 0;
        window.addEventListener("scroll", function() {
            var y = window.scrollY;
            if (y > lastY && y > 60) {
                header.classList.add("header-hidden");
            } else {
                header.classList.remove("header-hidden");
            }
            lastY = y;
        }, { passive: true });
    })();
    </script>
</body>
</html>
